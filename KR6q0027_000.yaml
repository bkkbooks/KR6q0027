front:
  text: 續燈正統序蓋聞普陀之勝無窮也去四明雖云才數百里然大洋當其前西望外國三韓諸山若在杳冥北接蓬萊其東則高麗日本蒼茫雲靄間當海濤盛壯排空觸岸之時風與水相搏咫尺不能辨而魚龍變怪俄頃百出及天地開陰夜起踞高頂視日初出滉漾巨浸中海盡赤已而跳踊出天末光射水猶吞吐久之余素疑所聞亟欲往一觀其奇意名山大海靈異所出沒必有恢奇之人深潛好學之士出乎其間而往來禱祈者率商賈竪子無文士可與語即求諸方外禪棲釋衲之倫亦絶不可得余益疑之別菴禪師本蜀人故高峰法嗣自蜀來浙禮徑山訪天童遂住錫普陀今年謁余武林出其所著續燈正統問序於余余觀其條析世系南能北秀派別宗分殆合五燈為一豈維摩法所謂無盡燈者耶雖然薪盡則火傳然必有最初之一薪今自別公溯大慧得十有七世大慧至達磨當得幾世耶由達磨以上至於釋迦為二十八祖乃釋迦未生前一劫必有一佛凡更七劫而得七佛即又當幾何世耶別公深潛好學必能為余述之余又聞達磨自西浮海至金陵倡其教於中國今別公乃復從中國振宗風於海外豈恢奇之至將偕普陀大士隱現山海俾人世終莫可得見耶他日登四明山望洛伽數百里外有光氣燭天與日光爭輝耀者必是書所在也于是乎序康熙丁丑秋七月賜進士第誥授光祿大夫兵部左侍郎前巡撫貴州兼理湖北川東等處地方提督軍務都察院右副都御史加四級法末海寧楊雍建拜撰序先聖有云西方有大聖人焉不治而不亂不言而自化自達磨傳其道入東土其為道也不立文字教外別傳明心見性了生脫死豫初探其門庭竟無所得且于履踐毫不相應然遇出世弘道之士擎拳豎指棒喝交馳一語一默間儼若過屠門不能禁其大嚼也壬申春泛南海登普陀得晤別庵和尚與語連日知為大慧十七世孫也贈額而還次年和尚以所集續燈正統徵序于豫豫既不能窺其門庭又安敢于和尚前作誑語哉然細詳是編以南宋為始要歸于今日補集五燈之未備是之謂續燈也以濟洞分列各清其授受表彰二桂之昌榮是之謂正統也燈續而統正將見燈燈不滅千載流光直使人人明心見性了生脫死所謂不治而不亂不言而自化其在斯歟其在斯歟時康熙癸酉春二月慈溪法弟薑宸英拜撰序瞿曇老子受然燈記莂為禪燈之始祖厥後祖祖相傳燈燈相續其統不亂雖其間有垂手入廛者有孤峯獨宿者有兼擅化權者有單提正令者其報緣不同其正統則一也或有化行於東南而不行於西北或有化行於西北而不行於東南皆本於報緣耳咸出自正統也徑山之下有聚雲慶忠高峯諸和尚相繼重振臨濟之道於西蜀別菴和尚嗣高峯老人西來江浙掃祖塔於徑山據師位於普陀而於鉗鎚獅象之餘志存表彰世系將濟宗先自曹溪十六世徑山編起至曹溪三十一世止次自曹溪十六世虎丘編起至曹溪三十五世止復將洞宗自曹溪十六世雪竇編起至曹溪三十七世止又收未詳法嗣及補遺共四十二卷名之曰續燈正統其心公其識遠其才全真可與傳燈會元諸録並行於天下後世矣後之讀斯編者忽然築著磕著洞見古人心肝五臟未必無其人也余與和尚忝屬同門頽齡之際獲見是書喜不自勝而為之序時康熙壬申夏五上浣奉直大夫商州牧前知新寧欒城兩縣事同門法弟嘉禾沈廷勱克齋氏拜撰續燈正統序釋氏之有燈録亦猶儒家之有通鑑也自堯舜禹湯文武以至歷代人君經國治民之政事皆載於通鑑之中自釋迦東西諸祖以至歷代禪師明心悟道之機緣皆載於燈録之內然精一執中建中建極帝王之所相傳也是經國治民何嘗不本於心哉未出母胎度人已畢經論之所稱贊也是明心悟道何嘗不利於生哉別菴和尚承嗣高峰乃大慧十七世孫也丙寅歲自西蜀來江浙掃祖塔於徑山寄杖錫於天童余與提臺陳公暨合郡諸先生同請主持普陀鎮海禪寺宗風丕振道譽遍聞名山藉以益著矣壬申秋以所編續燈正統索序於余其曰正統可知其所編不苟也余展閲數四方識徑山虎丘之下諸禪師如是明心如是悟道如是接物利生與吾儒致知誠意正心修身齊家治國平天下何以異哉蓋和尚妙齡開法乃有餘力編集續燈表揚正統豈非再來人乎雖然如是中峰禪師有云未生佛祖早傳此燈又作麼生請和尚下一轉語時康熙壬申桂月賜進士出身文林郎豫告養親兵科給事中加七級法弟屠粹忠頓首撰自序世尊説法四十九年末為迦葉看破達磨西來十萬餘里終被神光得髓三傳而信心銘出六傳而壇經行皆以闡發三藏十二部之幽微人以法顯法以人傳雖曰不立文字究亦何嘗離文字哉繼後二桂騰芳五燈續𦦨殺活齊施縱擒並用有權有實雙放雙收立賓立主行棒行喝所謂痛快謹嚴高古細密簡明發於開示則有上堂小參形於煅煉則有示衆普説見諸著述則有偈頌著拈別代徵評曲盡旨趣顯者微之幽者闡之即半言隻字具大關鍵積卷浩繁汗牛充棟欹歟盛矣運會相繼隆替不常歷宋季元明四五百年間或時際迍邅或地阻南北行道之士囿於偏都小邑經世之言沒於荒煙蔓草人幾淪喪法亦式微猶幸道不終泯理有來復山邊水邊尚有一箇半箇絲繫九鼎任荷千鈞宗風賴以不墜也延至明季隆慶萬曆間如虎丘十八世有龍池得法於善果維時正統尚絲懸也後得天童磬山其道大振又十八世有南明得法於車溪維時正統亦絲懸也後得鴛湖其道大振如雪竇十九世有廩山得法於宗鏡維時正統亦絲懸也後得壽昌其道大振又二十世有大覺得法於少室維時正統亦絲懸也後得雲門其道大振如大慧十三世有朝陽得法於秦嶺維時正統亦絲懸也後得聚雲其道大振一時法社星列雲布互相激揚不但荷包衲子專趨向上即朝臣碩士亦知問道徵心况值昭代鼎興世祖章皇帝徵書四出崇重法門當今聖主巡幸通都大旌名剎賜雲林額於靈隱問柏樹話於夾山信宿玄墓再遊虎丘登報恩之塔步昭慶之壇賜帑敕建金山普陀之梵宇華宮沙門詔見徵問玄旨單傳之道於茲益著荷擔斯道者無時不以提持後學開鑿人天為己任廣行著述積卷浩繁又不啻汗牛充棟矣但前輩録多單本或塔銘傳記殘斷簡中存十一干千百諸方各闡己宗為急務或揀收失於刻或博採流於濫豫因不辭固陋會輯是編惟冀後之來者覽是編而有補焉試觀南宋大慧虎丘定菴諸祖大振臨濟曹洞凡子若孫以一傳百類皆奉詔説法承旨開堂生有封死有諡帝王重法何其隆也然盛極而衰其弊至於市源流賣虗聲倚權附勢稱楊稱鄭勢固然也實人致之逮明季乘願扶危者若龍池南明大覺廩山朝陽諸師出參尋諸方退守林泉不務衒鬻不博名高輒計數十年不輕見人所接類皆銅頭鐵額克振家聲若天童磬山鴛湖雲門壽昌聚雲諸師地隔千里實同一心名山大剎竪幟相望衰極而盛時固然也亦人為之然今盛矣豫於此又不無履霜之懼妄操著述之權非得已也其庶幾藉法以顯人因人以傳法耳康熙辛未歲夏五月下浣西蜀高梁嗣祖沙門性統題於普陀之正續堂凡例傳燈録始於宋景德道原禪師繼則李遵勗居士集廣燈佛國白禪師成續燈晦翁明禪師作聯燈雷菴受禪師著普燈五燈盛行其考詳其詞博矣大川濟禪師乃輯之為五燈會元上自迦文下及大鑑十八世考精論確無遺議者慨自明中葉法運中衰語多遺失雖大報恩刻有續傳燈南石秀禪師有增集奈考世不廣近代燈録疊出曰補燈曰續略曰纘續曰存稿曰大統曰寶積纘述去取各有所尚是編特搜群集會為大成與廣潤僧寶傳互相發明曰續燈仍舊名也曰正統昭法系也派別支殊淵源則一紀世總標大鑑千百世分門之漸自可永杜大鑑十六世至十八世已載會元茲復從十六世起者以濟下兒孫俱出大慧虎丘亦猶上之南嶽青原也表其所自且以補會元之未備大慧虎丘同出臨濟從而分列蓋依平陽弘覺禪師禪燈世譜且二師傳嗣延促不同不能齊於一世而止也至於昭穆並如會元世譜不敢涉私源流各有嫡出惟嫡子孫奉嫡宗祖非他人可以妄冒者如虎丘源流中海舟普慈永慈之誤已考定於存稿寶積僧寶諸集中茲仍其舊曹洞丹霞下五代大統刪出以鹿門覺即淨因覺直接芙蓉楷常考南石秀禪師增集續傳燈與大統無異編稿已定適得鼓山為霖沛禪師源流辨謬甚言大統並增集之誤因列如遠門續略亦曰他家自有兒孫在宗師語句法眼所存即一言半句可續正宗其上堂小參偈頌機語悉採諸家成集述而不作著述固為流通宗眼然存人為最其有未得語句者亦載於目録中俟後有志搜羅之士庶得因名增補也有嗣無録者注曰不列章次嗣不可考者注曰無傳凡郡縣山寺稱呼俱遵近代免翻閲者猶豫濟宗自大鑑十六世大慧起至大鑑三十一世止大鑑十六世虎丘起至大鑑三十五世止洞宗自大鑑十六世起至大鑑三十七世止計卷四十二計册十未詳法嗣附於卷末
